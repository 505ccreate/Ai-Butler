<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAP | Alfred Neural Butler</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
background:#020617;
color:#e2e8f0;
font-family:Inter,system-ui;
overflow:hidden;
}

.band-bar{
width:4px;
height:4px;
background:#38bdf8;
margin:2px;
border-radius:2px;
transition:height .15s;
}

.freq-band{
display:flex;
height:60px;
align-items:center;
justify-content:center;
gap:4px;
}

.hybrid-input{
background:#020617;
border:1px solid #1e293b;
}

.hybrid-input:focus-within{
border-color:#38bdf8;
}

#feed{
font-family:monospace;
}
</style>
</head>

<body class="flex flex-col items-center justify-center min-h-screen p-6">

<header class="text-center mb-8">
<h2 class="text-xs tracking-[0.4em] text-sky-600">DISTINGUISHED ARRIVAL PROTOCOL</h2>
<h1 class="text-4xl italic">Alfred</h1>
</header>

<div class="flex flex-col items-center gap-6">

<div class="freq-band" id="visualizer">
<div class="band-bar"></div>
<div class="band-bar"></div>
<div class="band-bar"></div>
<div class="band-bar"></div>
<div class="band-bar"></div>
<div class="band-bar"></div>
<div class="band-bar"></div>
<div class="band-bar"></div>
</div>

<div id="stt-preview" class="text-xs text-sky-400 h-4"></div>

<div class="hybrid-input flex items-center p-2 rounded-full w-80">

<input id="chat-input"
type="text"
placeholder="Coordinate with Alfred..."
class="flex-1 bg-transparent outline-none px-2 text-sm">

<button id="send-btn" class="px-3 text-sky-400">Send</button>

</div>

<button id="mic-toggle"
class="border border-sky-700 px-6 py-3 rounded-full text-xs tracking-widest">

Initialize Voice

</button>

<div id="uplink-status" class="text-xs text-sky-500">
STDBY
</div>

</div>

<div id="feed"
class="mt-10 h-64 overflow-y-auto w-full max-w-xl space-y-2 text-xs">
</div>

<script>

const apiKey="AIzaSyBLoVT3ffe0r6KOnm7qHovaoCmzIdT3T8A"

let isVoiceMode=false

let conversationHistory=[
{
role:"user",
parts:[{text:"You are Alfred, a refined chauffeur concierge AI. Collect booking details for airport travel. Ask for name, pickup location, destination, date and passengers. Be concise."}]
}
]

const chatInput=document.getElementById("chat-input")
const sendBtn=document.getElementById("send-btn")
const micToggle=document.getElementById("mic-toggle")
const feed=document.getElementById("feed")
const sttPreview=document.getElementById("stt-preview")
const uplink=document.getElementById("uplink-status")

const synth=window.speechSynthesis

const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition

let recognition=null

if(SpeechRecognition){

recognition=new SpeechRecognition()

recognition.lang="en-US"
recognition.interimResults=true
recognition.continuous=true

recognition.onstart=()=>{
uplink.innerText="LISTENING"
}

recognition.onend=()=>{
if(isVoiceMode && !synth.speaking){
try{recognition.start()}catch(e){}
}else{
uplink.innerText="STDBY"
}
}

recognition.onresult=(event)=>{

let interim=""
let final=""

for(let i=event.resultIndex;i<event.results.length;i++){

if(event.results[i].isFinal){
final+=event.results[i][0].transcript
}else{
interim+=event.results[i][0].transcript
}

}

sttPreview.innerText=interim||final

if(final){

chatInput.value=final.trim()

sttPreview.innerText=""

handleManualInput()

}

}

}

function speak(text){

if(isVoiceMode && recognition){
try{recognition.stop()}catch(e){}
}

synth.cancel()

const utter=new SpeechSynthesisUtterance(text)

utter.rate=.9
utter.pitch=.9

utter.onstart=()=>{
uplink.innerText="ALFRED SPEAKING"
}

utter.onend=()=>{
if(isVoiceMode && recognition){
setTimeout(()=>{
try{recognition.start()}catch(e){}
},300)
}
}

synth.speak(utter)

}

function log(type,msg){

const div=document.createElement("div")

div.innerHTML=`<span class="text-sky-600">[${type}]</span> ${msg}`

feed.appendChild(div)

feed.scrollTop=feed.scrollHeight

}

async function getAIResponse(input){

log("USER",input)

conversationHistory.push({
role:"user",
parts:[{text:input}]
})

try{

const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:conversationHistory
})
})

const data=await res.json()

const reply=data.candidates[0].content.parts[0].text

conversationHistory.push({
role:"model",
parts:[{text:reply}]
})

log("ALFRED",reply)

speak(reply)

}catch(err){

log("ERROR","AI request failed")

}

}

function handleManualInput(){

const val=chatInput.value.trim()

if(!val)return

chatInput.value=""

getAIResponse(val)

}

sendBtn.onclick=handleManualInput

chatInput.addEventListener("keypress",e=>{
if(e.key==="Enter")handleManualInput()
})

micToggle.onclick=()=>{

if(!recognition){
alert("Speech Recognition not supported")
return
}

if(!isVoiceMode){

isVoiceMode=true

micToggle.innerText="Voice Engaged"

speak("Alfred online. How may I assist with your travel?")

}else{

isVoiceMode=false

micToggle.innerText="Initialize Voice"

try{recognition.stop()}catch(e){}

synth.cancel()

uplink.innerText="STDBY"

}

}

</script>

</body>
</html>
