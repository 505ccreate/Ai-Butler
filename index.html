<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DAP | Executive Digital Butler (Neural Native)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --dap-gold: #c5a059; --dap-black: #050505; }
        body { background-color: var(--dap-black); color: #e5e5e5; font-family: 'Inter', sans-serif; overflow: hidden; touch-action: manipulation; }
        .serif { font-family: 'Playfair Display', serif; }
        .glass { background: rgba(26, 26, 26, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(197, 160, 89, 0.1); }
        .status-orb { width: 140px; height: 140px; border-radius: 50%; background: radial-gradient(circle, rgba(197, 160, 89, 0.2) 0%, rgba(5, 5, 5, 1) 70%); border: 1px solid rgba(197, 160, 89, 0.3); transition: all 0.5s; position: relative; display: flex; align-items: center; justify-content: center; }
        .status-orb.active { box-shadow: 0 0 60px rgba(197, 160, 89, 0.5); border-color: var(--dap-gold); transform: scale(1.1); }
        
        /* Audio Wave Visualizer */
        .wave-container { display: flex; align-items: center; gap: 3px; height: 30px; }
        .wave-bar { width: 3px; height: 5px; background: var(--dap-gold); border-radius: 10px; transition: height 0.1s ease; }
        
        @keyframes pulse-animation { 0% { transform: scale(0.98); opacity: 0.6; } 50% { transform: scale(1.05); opacity: 0.9; } 100% { transform: scale(0.98); opacity: 0.6; } }
        .pulse { animation: pulse-animation 2s infinite ease-in-out; }
        
        .intelligence-feed::-webkit-scrollbar { width: 4px; }
        .intelligence-feed::-webkit-scrollbar-thumb { background: var(--dap-gold); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <header class="absolute top-8 text-center w-full px-4 border-b border-stone-900 pb-4">
        <h2 class="tracking-[0.4em] text-[10px] uppercase text-stone-500 mb-1">Distinguished Arrival Protocol</h2>
        <h1 class="serif text-3xl italic text-[var(--dap-gold)]">Puck</h1>
    </header>

    <main class="w-full max-w-5xl grid md:grid-cols-2 gap-8 items-center mt-12">
        <div class="flex flex-col items-center space-y-10 order-2 md:order-1">
            <div id="orb" class="status-orb">
                <div id="wave-viz" class="wave-container hidden">
                    <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
                </div>
            </div>
            
            <div class="text-center">
                <p id="status-text" class="text-stone-400 text-[10px] tracking-[0.3em] uppercase">Ready for Instructions</p>
                <p id="sub-status" class="text-stone-600 text-[10px] mt-2 italic px-4">Neural link initialized.</p>
            </div>
            <button id="toggle-btn" class="w-full max-w-xs px-8 py-5 border border-[var(--dap-gold)] text-[var(--dap-gold)] uppercase tracking-[0.2em] text-[10px] hover:bg-[var(--dap-gold)] hover:text-black transition-all duration-700">
                Summon Puck
            </button>
        </div>

        <div class="glass p-6 rounded-sm h-[320px] md:h-[450px] flex flex-col order-1 md:order-2">
            <div class="flex justify-between items-center mb-6 border-b border-stone-800 pb-2">
                <h3 class="text-[9px] uppercase tracking-[0.2em] text-stone-500">Intelligence Feed</h3>
                <span id="uplink-status" class="text-[var(--dap-gold)] text-[9px] font-bold animate-pulse">ELITE UPLINK</span>
            </div>
            <div id="feed" class="intelligence-feed flex-1 overflow-y-auto space-y-3 text-[11px] font-mono leading-relaxed">
                <div class="text-stone-700 italic opacity-50">// Neural buffers primed...</div>
            </div>
        </div>
    </main>

    <div id="confirmation-modal" class="fixed inset-0 bg-black/95 flex items-center justify-center hidden z-50 p-6">
        <div class="glass max-w-md w-full p-8 border-t-2 border-t-[var(--dap-gold)]">
            <h4 class="serif text-xl mb-4 text-[var(--dap-gold)] italic">Reservation Logged</h4>
            <div id="json-display" class="bg-black/80 p-5 rounded text-[10px] font-mono text-green-400 border border-stone-800 leading-relaxed overflow-x-auto"></div>
            <button onclick="closeModal()" class="mt-8 w-full py-4 border border-stone-800 text-stone-500 uppercase tracking-widest text-[9px] hover:text-white transition-all">
                Close Manifest
            </button>
        </div>
    </div>

    <script>
        // --- ELITE NATIVE ARCHITECTURE (Elijah's "Smooth" Update) ---
        const apiKey = ""; // Gemini API Key
        let isListening = false;
        
        let conversationHistory = [
            { role: "user", parts: [{ text: "IDENTITY: You are Puck, a sophisticated DAP butler. TONE: Calm, authoritative, executive. BEHAVIOR: Use natural pauses. Never sound rushed. If asked for info, provide it with weight. Collect: Name, Date, Pickup, Destination, Pax. Require 'Confirm' to finalize." }] }
        ];

        const toggleBtn = document.getElementById('toggle-btn');
        const statusText = document.getElementById('status-text');
        const orb = document.getElementById('orb');
        const feed = document.getElementById('feed');
        const waveViz = document.getElementById('wave-viz');

        const synth = window.speechSynthesis;
        const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
        const recognition = new SpeechRecognition();

        recognition.continuous = false; // Mobile Chrome handles false better for command-patterns
        recognition.interimResults = true; // Set to true so we can 'see' speech happening
        recognition.lang = 'en-US';

        function getExecutiveVoice() {
            const voices = synth.getVoices();
            return voices.find(v => v.name.includes('Natural')) || 
                   voices.find(v => v.name.includes('Google UK English Male')) || 
                   voices.find(v => v.name.includes('Premium')) ||
                   voices.find(v => v.lang.includes('en-GB')) ||
                   voices[0];
        }

        function speak(text) {
            recognition.abort(); 
            synth.cancel();

            const phrases = text.split(/[,.;:?!]/g).filter(p => p.trim().length > 0);
            
            phrases.forEach((phrase, index) => {
                const utterance = new SpeechSynthesisUtterance(phrase.trim());
                utterance.voice = getExecutiveVoice();
                utterance.rate = 0.92;
                utterance.pitch = 0.85;

                utterance.onstart = () => {
                    orb.classList.add('active', 'pulse');
                    statusText.innerText = "Speaking";
                    waveViz.classList.add('hidden');
                };

                utterance.onend = () => {
                    if (index === phrases.length - 1) {
                        orb.classList.remove('active', 'pulse');
                        // Crucial: Give the browser 500ms to release the audio channel before starting mic
                        setTimeout(startListening, 500);
                    }
                };

                synth.speak(utterance);
            });
        }

        function startListening() {
            if (isListening) return;
            try {
                // Hard reset of recognition session to clear any browser audio locks
                recognition.abort(); 
                setTimeout(() => {
                    recognition.start();
                    log("STATUS", "Microphone Active...");
                }, 100);
            } catch (e) {
                console.error("Recognition Start Error:", e);
            }
        }

        recognition.onstart = () => { 
            isListening = true; 
            statusText.innerText = "Listening"; 
            waveViz.classList.remove('hidden');
            animateWave(true);
        };
        
        recognition.onend = () => { 
            isListening = false; 
            statusText.innerText = "Processing"; 
            waveViz.classList.add('hidden');
            animateWave(false);
        };
        
        recognition.onerror = (event) => {
            log("MIC ERROR", event.error, "text-red-400");
            if (event.error === 'no-speech') {
                // If it timed out, just restart quietly
                setTimeout(startListening, 1000);
            }
        };

        recognition.onresult = async (event) => {
            const transcript = event.results[0][0].transcript;
            const isFinal = event.results[0].isFinal;

            if (isFinal) {
                log("USER", transcript, "text-stone-100");
                if(synth.speaking) synth.cancel(); 
                await getAIResponse(transcript);
            } else {
                // Provide visual feedback for interim results
                statusText.innerText = "Hearing: " + transcript;
            }
        };

        async function getAIResponse(userInput) {
            log("SYSTEM", "Neural buffer syncing...");
            conversationHistory.push({ role: "user", parts: [{ text: userInput }] });

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: conversationHistory,
                        generationConfig: {
                            responseMimeType: "application/json",
                            responseSchema: {
                                type: "OBJECT",
                                properties: {
                                    reply: { type: "string" },
                                    saveData: { 
                                        type: "OBJECT",
                                        properties: {
                                            name: { type: "string" },
                                            when: { type: "string" },
                                            from: { type: "string" },
                                            to: { type: "string" },
                                            passengers: { type: "integer" }
                                        }
                                    }
                                }
                            }
                        }
                    })
                });

                const data = await response.json();
                const result = JSON.parse(data.candidates[0].content.parts[0].text);
                
                log("PUCK", result.reply, "text-stone-400 italic font-light");
                conversationHistory.push({ role: "model", parts: [{ text: result.reply }] });
                
                if (result.saveData && (userInput.toLowerCase().includes("confirm") || userInput.toLowerCase().includes("yes"))) {
                    log("SUCCESS", "Manifest sync complete.");
                    document.getElementById('json-display').innerText = JSON.stringify(result.saveData, null, 2);
                    document.getElementById('confirmation-modal').classList.remove('hidden');
                }

                speak(result.reply);

            } catch (err) {
                log("ERROR", "Uplink destabilized.", "text-red-500");
                speak("Forgive me. My neural link is experiencing minor interference.");
            }
        }

        function log(type, msg, color = "text-stone-300") {
            const div = document.createElement('div');
            div.className = "border-l border-stone-800 pl-3 transition-opacity duration-300";
            div.innerHTML = `<span class="text-[var(--dap-gold)] font-bold mr-2 opacity-50 uppercase tracking-tighter">[${type}]</span><span class="${color}">${msg}</span>`;
            feed.appendChild(div);
            feed.scrollTop = feed.scrollHeight;
        }

        let waveInterval;
        function animateWave(active) {
            const bars = document.querySelectorAll('.wave-bar');
            if (!active) {
                clearInterval(waveInterval);
                bars.forEach(b => b.style.height = '5px');
                return;
            }
            waveInterval = setInterval(() => {
                bars.forEach(b => {
                    b.style.height = Math.floor(Math.random() * 20 + 5) + 'px';
                });
            }, 100);
        }

        toggleBtn.addEventListener('click', () => {
            if (synth.speaking) synth.cancel();
            log("SYSTEM", "Link established.");
            speak("Puck here. I am monitoring the transit conditions for your Philadelphia arrival. How shall we coordinate?");
        });

        function closeModal() { document.getElementById('confirmation-modal').classList.add('hidden'); }
        
        window.speechSynthesis.onvoiceschanged = () => {
            const v = getExecutiveVoice();
            log("VOICE", `Profile: ${v ? v.name : 'Standard'}`);
        };
    </script>
</body>
</html>
