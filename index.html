<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DAP | Alfred Neural Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root { 
            --dap-blue-dark: #020617;
            --dap-accent: #38bdf8;
            --dap-glow: rgba(56, 189, 248, 0.4);
        }
        
        body { 
            background: var(--dap-blue-dark);
            color: #f0f9ff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .orb-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
        }

        .orb {
            position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.3; mix-blend-mode: screen;
            animation: drift 30s infinite alternate ease-in-out;
        }
        .orb-1 { width: 450px; height: 450px; background: #1e40af; top: -5%; left: -5%; }
        .orb-2 { width: 550px; height: 550px; background: #0369a1; bottom: -10%; right: -5%; animation-delay: -7s; }

        @keyframes drift { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(40px, 60px) scale(1.1); } }

        .serif { font-family: 'Playfair Display', serif; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(56, 189, 248, 0.1); }
        
        .status-orb {
            width: 220px; height: 220px; border-radius: 50%;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.1) 0%, transparent 70%);
            border: 1px solid rgba(56, 189, 248, 0.2);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; transition: all 0.3s ease;
        }
        .status-orb.active { border-color: var(--dap-accent); box-shadow: 0 0 40px var(--dap-glow); }

        .audio-band { display: flex; align-items: center; gap: 4px; height: 40px; }
        .bar { width: 3px; height: 4px; background: var(--dap-accent); border-radius: 2px; transition: height 0.1s ease; }

        .stt-preview { position: absolute; bottom: -50px; width: 300px; text-align: center; font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em; color: var(--dap-accent); font-family: monospace; opacity: 0.7; }
        .intelligence-feed::-webkit-scrollbar { width: 4px; }
        .intelligence-feed::-webkit-scrollbar-thumb { background: var(--dap-accent); border-radius: 10px; }

        /* Sync Button pulse */
        #sync-btn.needed { animation: pulse-red 2s infinite; border-color: #ef4444; color: #ef4444; }
        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="orb-container"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

    <header class="absolute top-8 text-center w-full px-4">
        <h2 class="tracking-[0.6em] text-[10px] uppercase text-sky-700 font-bold mb-1">Distinguished Arrival Protocol</h2>
        <h1 class="serif text-4xl italic text-sky-100">Alfred</h1>
    </header>

    <main class="w-full max-w-6xl grid md:grid-cols-2 gap-16 items-center z-10">
        <div class="flex flex-col items-center space-y-12 order-2 md:order-1">
            <div id="orb-main" class="status-orb">
                <div id="visualizer" class="audio-band">
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                </div>
                <div id="stt-preview" class="stt-preview"></div>
            </div>
            
            <div class="w-full max-w-sm space-y-4">
                <div class="glass flex items-center p-1 rounded-full px-5 border-sky-900/40">
                    <input type="text" id="chat-input" placeholder="Coordinate with Alfred..." class="flex-1 bg-transparent py-3 text-sm text-sky-100 placeholder:text-sky-800 focus:outline-none">
                    <button id="send-btn" class="p-2 text-sky-500 hover:text-white transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
                <div class="flex gap-2">
                    <button id="mic-toggle" class="flex-1 py-5 rounded-full border border-sky-900 text-sky-500 uppercase tracking-widest text-[10px] hover:bg-sky-500/10 transition-all flex items-center justify-center gap-3">
                        <div id="mic-status-dot" class="w-2 h-2 rounded-full bg-sky-900"></div>
                        <span id="mic-text">Mic Off</span>
                    </button>
                    <button id="sync-btn" class="px-6 py-5 rounded-full border border-sky-900 text-sky-700 uppercase tracking-widest text-[10px] hover:text-sky-400 transition-all">
                        Sync
                    </button>
                </div>
            </div>
        </div>

        <div class="glass p-8 rounded-2xl h-[520px] flex flex-col order-1 md:order-2">
            <div class="flex justify-between items-center mb-6 border-b border-sky-900/30 pb-4">
                <h3 class="text-[10px] uppercase tracking-[0.4em] text-sky-600 font-bold font-mono">Neural Stream</h3>
                <span id="uplink-label" class="text-sky-400 text-[10px] font-bold tracking-tighter opacity-40 uppercase">Standby</span>
            </div>
            <div id="feed" class="intelligence-feed flex-1 overflow-y-auto space-y-4 text-[12px] font-mono leading-relaxed text-sky-200">
                <div class="opacity-30 italic font-light">// Alfred neural buffers ready.</div>
            </div>
        </div>
    </main>

    <script>
        const apiKey = "AIzaSyBLoVT3ffe0r6KOnm7qHovaoCmzIdT3T8A";
        let isVoiceActive = false;
        let history = [{ role: "user", parts: [{ text: "IDENTITY: You are Alfred, a prestigious butler. TONE: Sophisticated, authoritative. MISSION: Arrange airport travel (PHL, JFK, EWR, IAD, DCA). Collect Name, Date, Pickup, Destination, Pax. Require verbal 'Confirm' to finalize. Stay discrete." }] }];

        const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;

        // --- Neural Voice (The "Elijah" Pacing Engine) ---
        function convertPCMToWav(pcmDataB64, sampleRate = 24000) {
            const pcmData = Uint8Array.from(atob(pcmDataB64), c => c.charCodeAt(0));
            const buffer = new ArrayBuffer(44 + pcmData.length);
            const view = new DataView(buffer);
            const writeString = (offset, string) => { for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i)); };
            writeString(0, 'RIFF');
            view.setUint32(4, 36 + pcmData.length, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true); // PCM
            view.setUint16(22, 1, true); // Mono
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, pcmData.length, true);
            new Uint8Array(buffer, 44).set(pcmData);
            return new Blob([buffer], { type: 'audio/wav' });
        }

        async function speak(text) {
            try {
                if (isVoiceActive) recognition.stop();
                document.getElementById('uplink-label').innerText = "CONNECTING";
                
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Alfred says: ${text}` }] }],
                        generationConfig: { 
                            responseModalities: ["AUDIO"], 
                            speechConfig: { 
                                voiceConfig: { 
                                    prebuiltVoiceConfig: { voiceName: "Charon" } 
                                } 
                            } 
                        }
                    })
                });

                const data = await response.json();
                const pcm = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                
                if (!pcm) throw new Error("Audio buffer empty.");

                const blob = convertPCMToWav(pcm);
                const audio = new Audio(URL.createObjectURL(blob));
                
                audio.onplay = () => { 
                    document.getElementById('uplink-label').innerText = "ALFRED SPEAKING";
                    document.getElementById('orb-main').classList.add('active');
                    animateBand(true, 'talking');
                };

                audio.onended = () => { 
                    document.getElementById('orb-main').classList.remove('active');
                    animateBand(isVoiceActive, 'listening');
                    document.getElementById('uplink-label').innerText = isVoiceActive ? "LISTENING" : "STDBY";
                    if (isVoiceActive) {
                        try { recognition.start(); } catch(e) {}
                    }
                };
                
                audio.play();
            } catch (e) {
                log("ERROR", "Vocal link interrupted. Check API key or permissions.");
                document.getElementById('sync-btn').classList.add('needed');
            }
        }

        recognition.onresult = (event) => {
            let interim = ''; let final = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) final += event.results[i][0].transcript;
                else interim += event.results[i][0].transcript;
            }
            document.getElementById('stt-preview').innerText = interim || final;
            if (final) { 
                log("UPLINK", final, "text-white"); 
                document.getElementById('stt-preview').innerText = "";
                getAI(final); 
            }
        };

        async function getAI(val) {
            log("NEURAL", "Synchronizing...");
            history.push({ role: "user", parts: [{ text: val }] });
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: history })
                });
                const data = await res.json();
                const reply = data.candidates[0].content.parts[0].text;
                log("ALFRED", reply, "text-sky-400 italic");
                history.push({ role: "model", parts: [{ text: reply }] });
                speak(reply);
            } catch (e) { log("ERROR", "Neural brain desync."); }
        }

        // --- User Interaction ---

        document.getElementById('mic-toggle').onclick = () => {
            isVoiceActive = !isVoiceActive;
            if (isVoiceActive) {
                document.getElementById('mic-text').innerText = "Mic On";
                document.getElementById('mic-status-dot').className = "w-2 h-2 rounded-full bg-sky-400 animate-pulse";
                speak("Alfred here. How shall we coordinate your transit?");
            } else {
                document.getElementById('mic-text').innerText = "Mic Off";
                document.getElementById('mic-status-dot').className = "w-2 h-2 rounded-full bg-sky-900";
                recognition.stop();
                log("SYSTEM", "Voice link suspended.");
            }
        };

        document.getElementById('sync-btn').onclick = () => {
            log("SYSTEM", "Re-syncing neural buffers...");
            document.getElementById('sync-btn').classList.remove('needed');
            location.reload(); // Hard reset for browser locks
        };

        document.getElementById('send-btn').onclick = () => {
            const val = document.getElementById('chat-input').value.trim();
            if (val) {
                log("MANUAL", val, "text-sky-100 font-bold");
                document.getElementById('chat-input').value = "";
                getAI(val);
            }
        };

        function log(type, msg, color) {
            const div = document.createElement('div');
            div.className = "border-l-2 border-sky-900/30 pl-4 py-1";
            div.innerHTML = `<span class="text-sky-600 font-bold mr-3 text-[9px] uppercase tracking-widest">[${type}]</span><span class="${color || 'text-sky-300'}">${msg}</span>`;
            document.getElementById('feed').appendChild(div);
            document.getElementById('feed').scrollTop = document.getElementById('feed').scrollHeight;
        }

        let bInterval;
        function animateBand(active, mode) {
            const bars = document.querySelectorAll('.bar'); clearInterval(bInterval);
            if (!active) { bars.forEach(b => b.style.height = '4px'); return; }
            bInterval = setInterval(() => { bars.forEach(b => { b.style.height = (mode === 'talking' ? Math.random() * 40 + 5 : Math.random() * 12 + 4) + 'px'; }); }, 80);
        }
    </script>
</body>
</html>
