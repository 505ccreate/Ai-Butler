<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DAP | Executive Digital Butler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --dap-gold: #c5a059;
            --dap-black: #050505;
            --dap-gray: #1a1a1a;
        }
        body {
            background-color: var(--dap-black);
            color: #e5e5e5;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }
        .serif { font-family: 'Playfair Display', serif; }
        
        .glass {
            background: rgba(26, 26, 26, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(197, 160, 89, 0.1);
        }

        .status-orb {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(197, 160, 89, 0.2) 0%, rgba(5, 5, 5, 1) 70%);
            border: 1px solid rgba(197, 160, 89, 0.3);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .status-orb.active {
            box-shadow: 0 0 60px rgba(197, 160, 89, 0.5);
            border-color: var(--dap-gold);
            transform: scale(1.1);
        }

        @keyframes pulse-animation {
            0% { transform: scale(0.98); opacity: 0.6; }
            50% { transform: scale(1.05); opacity: 0.9; }
            100% { transform: scale(0.98); opacity: 0.6; }
        }
        .pulse { animation: pulse-animation 2s infinite ease-in-out; }

        .intelligence-feed::-webkit-scrollbar { width: 4px; }
        .intelligence-feed::-webkit-scrollbar-thumb { background: var(--dap-gold); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 md:p-10">

    <header class="absolute top-8 text-center w-full px-4">
        <h2 class="tracking-[0.4em] text-[10px] uppercase text-stone-500 mb-1">Distinguished Arrival Protocol</h2>
        <h1 class="serif text-3xl italic text-[var(--dap-gold)]">Puck</h1>
    </header>

    <main class="w-full max-w-5xl grid md:grid-cols-2 gap-8 md:gap-16 items-center">
        
        <div class="flex flex-col items-center space-y-10 order-2 md:order-1">
            <div id="orb" class="status-orb flex items-center justify-center">
                <div class="w-2 h-2 rounded-full bg-[var(--dap-gold)] opacity-20"></div>
            </div>
            
            <div class="text-center">
                <p id="status-text" class="text-stone-400 text-[10px] tracking-[0.3em] uppercase text-center w-full block">System Standby</p>
                <p id="sub-status" class="text-stone-600 text-[10px] mt-2 italic px-4">Biometric link secure. PHL conditions nominal.</p>
            </div>

            <button id="toggle-btn" class="w-full max-w-xs px-8 py-5 border border-[var(--dap-gold)] text-[var(--dap-gold)] uppercase tracking-[0.2em] text-[10px] hover:bg-[var(--dap-gold)] hover:text-black transition-all duration-700 disabled:opacity-30" disabled>
                Biometric Syncing...
            </button>
        </div>

        <div class="glass p-6 rounded-sm h-[320px] md:h-[450px] flex flex-col order-1 md:order-2">
            <div class="flex justify-between items-center mb-6 border-b border-stone-800 pb-2">
                <h3 class="text-[9px] uppercase tracking-[0.2em] text-stone-500">Intelligence Feed</h3>
                <span id="uplink-status" class="text-red-500 text-[9px] font-bold">OFFLINE</span>
            </div>
            <div id="feed" class="intelligence-feed flex-1 overflow-y-auto space-y-3 text-[11px] font-mono leading-relaxed">
                <!-- System logs appear here -->
            </div>
            <button id="force-handshake" class="hidden mt-4 w-full py-4 bg-red-900/20 border border-red-900 text-red-500 text-[9px] font-bold uppercase tracking-widest hover:bg-red-900 hover:text-white transition-all">
                Force Security Bypass
            </button>
        </div>
    </main>

    <div id="confirmation-modal" class="fixed inset-0 bg-black/95 flex items-center justify-center hidden z-50 p-6">
        <div class="glass max-w-md w-full p-8 border-t-2 border-t-[var(--dap-gold)]">
            <h4 class="serif text-xl mb-4 text-[var(--dap-gold)] italic">Reservation Logged</h4>
            <div id="json-display" class="bg-black/80 p-5 rounded text-[10px] font-mono text-green-400 border border-stone-800 leading-relaxed overflow-x-auto"></div>
            <button onclick="closeModal()" class="mt-8 w-full py-4 border border-stone-800 text-stone-500 uppercase tracking-widest text-[9px] hover:text-white transition-all">
                Close Manifest
            </button>
        </div>
    </div>

    <!-- Script Injection - Direct Load -->
    <script src="https://cdn.jsdelivr.net/npm/@vapi-ai/web@1.0.1/dist/vapi-sdk.js" crossorigin="anonymous"></script>

    <script>
        // --- SECURE PUBLIC KEY ---
        const VAPI_PUBLIC_KEY = "403995f4-85b3-4df3-8dac-01fab0ce7442"; 
        
        let vapi = null;
        let isActive = false;

        const toggleBtn = document.getElementById('toggle-btn');
        const forceBtn = document.getElementById('force-handshake');
        const statusText = document.getElementById('status-text');
        const uplinkLabel = document.getElementById('uplink-status');
        const orb = document.getElementById('orb');
        const feed = document.getElementById('feed');
        const modal = document.getElementById('confirmation-modal');
        const jsonDisplay = document.getElementById('json-display');

        function log(type, msg, color = "text-stone-300") {
            const div = document.createElement('div');
            div.className = "border-l-2 border-stone-900 pl-3 transition-all duration-500";
            div.innerHTML = `<span class="text-[var(--dap-gold)] font-bold mr-2 opacity-70">[${type}]</span><span class="${color}">${msg}</span>`;
            feed.appendChild(div);
            feed.scrollTop = feed.scrollHeight;
        }

        function initVapi() {
            if (window.Vapi) {
                try {
                    vapi = new window.Vapi(VAPI_PUBLIC_KEY);
                    setupEvents();
                    log("SUCCESS", "Handshake accepted. Puck is live.", "text-green-500");
                    uplinkLabel.innerText = "LIVE UPLINK";
                    uplinkLabel.classList.remove('text-red-500');
                    uplinkLabel.classList.add('text-[var(--dap-gold)]', 'animate-pulse');
                    toggleBtn.innerText = "Summon Puck";
                    toggleBtn.disabled = false;
                    forceBtn.classList.add('hidden');
                } catch (e) {
                    log("ERROR", "Internal init failure.", "text-red-500");
                }
            } else {
                log("SECURITY", "Uplink blocked by browser policy.", "text-red-500");
                forceBtn.classList.remove('hidden');
            }
        }

        // Setup Vapi Event Listeners
        function setupEvents() {
            vapi.on("call-start", () => {
                log("STATUS", "Protocol active. Puck listening.");
                orb.classList.add('pulse');
            });
            vapi.on("call-end", () => { resetUI(); isActive = false; });
            vapi.on("speech-start", () => orb.classList.add('active'));
            vapi.on("speech-end", () => orb.classList.remove('active'));
            vapi.on("message", (m) => {
                if (m.type === "transcript" && m.transcriptType === "final") {
                    log(m.role.toUpperCase(), m.transcript, m.role === "user" ? "text-stone-100" : "text-stone-400 italic");
                }
                if (m.type === "tool-calls") {
                    const tool = m.toolCalls[0];
                    if (tool.function.name === "save_reservation") {
                        log("MANIFEST", "Synchronizing manifest with secure server...");
                        jsonDisplay.innerText = JSON.stringify(JSON.parse(tool.function.arguments), null, 2);
                        modal.classList.remove('hidden');
                    }
                }
            });
            vapi.on("error", (e) => {
                console.error(e);
                log("ERROR", "Uplink signal lost.", "text-red-500");
            });
        }

        // Toggle Interaction
        toggleBtn.addEventListener('click', () => {
            if (!vapi) return;
            if (!isActive) {
                vapi.start(config).catch(() => log("MIC", "Audio permissions required.", "text-red-400"));
                statusText.innerText = "Active Protocol";
                toggleBtn.innerText = "End Protocol";
            } else {
                vapi.stop();
                resetUI();
            }
            isActive = !isActive;
        });

        function resetUI() {
            statusText.innerText = "System Standby";
            orb.classList.remove('active', 'pulse');
            toggleBtn.innerText = "Summon Puck";
            log("SYSTEM", "Link terminated.");
        }

        function closeModal() { modal.classList.add('hidden'); }

        // Puck Assistant Configuration
        const config = {
            name: "Puck",
            firstMessage: "Puck here. How shall we handle your Philadelphia arrival?",
            model: {
                provider: "google",
                model: "gemini-2.0-flash",
                messages: [{ 
                    role: "system", 
                    content: "You are Puck, a discrete DAP butler. Collect: Name, Date/Time, Pickup, Destination, Pax Count. Summary + 'Confirm' required to save." 
                }],
                tools: [{
                    type: "function",
                    function: {
                        name: "save_reservation",
                        description: "Logs reservation after user says 'Confirm'",
                        parameters: {
                            type: "object",
                            properties: {
                                name: { type: "string" },
                                when: { type: "string" },
                                from: { type: "string" },
                                to: { type: "string" },
                                passengers: { type: "integer" }
                            },
                            required: ["name", "when", "from", "to", "passengers"]
                        }
                    }
                }]
            },
            voice: { provider: "playht", voiceId: "s3://voice-cloning-zero-shot/d3163158-b682-416b-967a-59b56f8f1704/sophia/manifest.json" }
        };

        // Manual Security Bypass
        forceBtn.onclick = () => {
            log("ACTION", "Forcing biometric override...");
            const s = document.createElement('script');
            s.src = "https://cdn.jsdelivr.net/npm/@vapi-ai/web@1.0.1/dist/vapi-sdk.js";
            s.crossOrigin = "anonymous";
            s.onload = initVapi;
            document.body.appendChild(s);
        };

        // Initial Load Check
        setTimeout(initVapi, 1500); 
    </script>
</body>
</html>
